<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-secondary-container": "#0c7521",
            "background": "#f7f9fb",
            "tertiary-fixed": "#d2e6ef",
            "surface": "#f7f9fb",
            "primary-container": "#007abc",
            "on-primary-fixed-variant": "#004a75",
            "tertiary": "#4c5f66",
            "surface-container": "#eceef0",
            "on-background": "#191c1e",
            "tertiary-fixed-dim": "#b6cad2",
            "error": "#ba1a1a",
            "on-tertiary-fixed-variant": "#374951",
            "on-secondary": "#ffffff",
            "on-surface": "#191c1e",
            "on-primary-fixed": "#001d32",
            "secondary-fixed": "#98f994",
            "primary-fixed-dim": "#96ccff",
            "on-secondary-fixed": "#002204",
            "secondary-fixed-dim": "#7ddc7a",
            "on-tertiary-container": "#fafdff",
            "surface-container-high": "#e6e8ea",
            "outline-variant": "#bfc7d2",
            "outline": "#707882",
            "on-tertiary-fixed": "#0b1e24",
            "on-secondary-fixed-variant": "#005313",
            "inverse-surface": "#2d3133",
            "primary-fixed": "#cee5ff",

            "on-error": "#ffffff",
            "surface-dim": "#d8dadc",
            "inverse-primary": "#96ccff",
            "error-container": "#ffdad6",
            "surface-bright": "#f7f9fb",
            "surface-container-low": "#f2f4f6",
            "surface-variant": "#e0e3e5",
            "tertiary-container": "#65777f",
            "secondary-container": "#98f994",
            "primary": "#006096",
            "on-surface-variant": "#3f4851",
            "inverse-on-surface": "#eff1f3",
            "secondary": "#006e1c",
            "on-error-container": "#93000a",
            "on-tertiary": "#ffffff",
            "surface-tint": "#00639a",
            "surface-container-highest": "#e0e3e5"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "gutter": "24px",
            "container-max-width": "640px",
            "base": "8px",
            "margin-mobile": "16px",
            "input-height": "56px",
            "card-padding": "32px"
          },
          "fontFamily": {
            "label-md": ["Public Sans"],
            "body-lg": ["Public Sans"],
            "headline-md": ["Public Sans"],
            "headline-lg": ["Public Sans"],
            "body-md": ["Public Sans"]
          },
          "fontSize": {
            "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Public Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Component (from JSON) -->
<header class="bg-slate-50/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-slate-200">
<div class="flex justify-between items-center px-6 h-16 max-w-[640px] mx-auto w-full">
<div class="text-xl font-bold text-sky-700 font-public-sans tracking-tight">CareSync</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:text-sky-600 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-margin-mobile">
<div class="w-full max-w-[640px] flex flex-col gap-8">
<!-- Content Header -->
<div class="text-center space-y-2">
<h1 class="text-headline-lg font-headline-lg text-on-surface">Create Your Account</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Select your role to continue</p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Doctor Role Card -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="role" type="radio" value="doctor"/>
<div class="h-full bg-surface-container-lowest border border-outline-variant p-card-padding rounded-xl transition-all duration-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:shadow-lg peer-checked:border-primary peer-checked:ring-2 peer-checked:ring-primary/20 flex flex-col items-start gap-4">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="stethoscope">stethoscope</span>
</div>
<div class="space-y-1">
<h3 class="text-headline-md font-headline-md text-on-surface">Doctor</h3>
<p class="text-body-md font-body-md text-on-surface-variant">Provide care, manage patients, and schedule appointments</p>
</div>
<div class="mt-auto pt-4 flex items-center text-primary font-label-md text-label-md">
<span>Select Role</span>
<span class="material-symbols-outlined ml-2 text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</label>
<!-- Patient Role Card -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio" value="patient"/>
<div class="h-full bg-surface-container-lowest border border-outline-variant p-card-padding rounded-xl transition-all duration-200 shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:shadow-lg peer-checked:border-secondary peer-checked:ring-2 peer-checked:ring-secondary/20 flex flex-col items-start gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</div>
<div class="space-y-1">
<h3 class="text-headline-md font-headline-md text-on-surface">Patient</h3>
<p class="text-body-md font-body-md text-on-surface-variant">Book appointments, consult doctors, and manage your health</p>
</div>
<div class="mt-auto pt-4 flex items-center text-secondary font-label-md text-label-md">
<span>Select Role</span>
<span class="material-symbols-outlined ml-2 text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</label>
</div>
<!-- Footer Action -->
<div class="flex flex-col items-center gap-6 mt-4">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-label-md text-label-md shadow-md active:scale-[0.98] transition-all hover:bg-primary/90 flex items-center justify-center gap-2">
          Continue
          <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<div class="flex items-center gap-2 text-on-surface-variant text-body-md font-body-md">
<span>Already have an account?</span>
<a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</div>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<!-- Hero Image Support (Bento Contextual) -->
<div class="hidden lg:block fixed left-gutter top-1/2 -translate-y-1/2 w-[300px]">
<div class="rounded-xl overflow-hidden shadow-xl border border-outline-variant bg-white p-4 space-y-4">
<img alt="Healthcare professional using a digital tablet" class="w-full aspect-square object-cover rounded-lg" data-alt="Modern clinical setting with a smiling female doctor holding a digital tablet with medical charts, soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOaqQA1NB0L9o1EiPqMBtFKgZOf-Bc-x6tPW58kl0L1C1CTqjjo90t_P1V3GYSvpN5EcJr83OUN8GgACtt892SPvBYIz7y0JtV5Uy5D8LYW-BG-XMHSQ6RSNsSN0P-1cD5dVlEaLBbsroAWRa4oLjOOqGd8SrkUgZ7uYwNcpOROchIgkS05AuSoW4gAuLq0d0d-VaJH8G2D_8We4ld_btuNgVKWFj62jDo4qBKKWWb7vAYumkQMEsJwlotVZzXQp5ApWvcPOWI2_HG"/>
<div class="space-y-2">
<div class="h-2 w-2/3 bg-surface-container-highest rounded"></div>
<div class="h-2 w-full bg-surface-container-highest rounded"></div>
</div>
</div>
</div>
<div class="hidden lg:block fixed right-gutter top-1/2 -translate-y-1/2 w-[300px]">
<div class="rounded-xl overflow-hidden shadow-xl border border-outline-variant bg-white p-4 space-y-4">
<img alt="Patient in a peaceful recovery environment" class="w-full aspect-square object-cover rounded-lg" data-alt="Calm bright hospital room with a large window showing green trees, focus on a modern medical patient monitor and comfortable chair" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcZPvgg34RYLG4_pvu4a7b5A3YNyGvkOJc7nS5UqUQ8C44fESmZJjBW7nHI02B-lTIhRuSwpCVVXSy8-2F416mGJFkG_aniTHy0AECdlR7FTUugTvSC6Xgz_lH1eCOwagJLc4qGv-9XrPc6EczNcqEdxjYtizq6P2_oSgtwqr1TqzeJ5iWE0KrNhyLHMgOT17G9veYKcih1IOFf09-qSI1cHEtbKqCYQiFqTyg7KiO6aF27xqn6tZs1G1PgF7wUu-3-KsHsZK4t-hA"/>
<div class="space-y-2">
<div class="h-2 w-3/4 bg-surface-container-highest rounded"></div>
<div class="h-2 w-1/2 bg-surface-container-highest rounded"></div>
</div>
</div>
</div>
</body></html>
