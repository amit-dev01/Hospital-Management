<!DOCTYPE html>

                      "gutter": "24px"

              "fontFamily": {
                      "body-lg": ["Public Sans"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #f7f9fb;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-6 h-16 md:h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60">
<div class="w-full max-w-screen-xl flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="medical_services">medical_services</span>
<span class="text-xl font-bold tracking-tight text-sky-600 dark:text-sky-400">MediFlow</span>
</div>
<div class="hidden md:flex items-center gap-8">
<nav class="flex gap-6">
<!-- Navigation items suppressed for transactional login focus as per UX Goal mandate -->
</nav>
</div>
<div class="flex items-center gap-4">
<span class="text-label-md font-label-md text-slate-500">English</span>
<span class="material-symbols-outlined text-slate-400 text-xl" data-icon="language">language</span>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-margin-mobile">
<div class="w-full max-w-[640px] flex flex-col items-center">
<!-- Branding/Welcome Section -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your health dashboard</p>
</div>
<!-- Login Card -->
<div class="w-full bg-white border border-outline-variant/30 rounded-xl p-card-padding shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
<form class="space-y-6" onsubmit="return false;">
<!-- Input: Mobile or Email -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Mobile Number or Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline pointer-events-none group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="+91 or email@example.com" type="text"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline pointer-events-none group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA (Disabled State) -->
<div class="pt-2">
<button class="w-full h-[56px] bg-slate-200 text-slate-400 font-label-md text-body-md rounded-lg cursor-not-allowed flex items-center justify-center gap-2 transition-all" disabled="">
                            Sign In
                            <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-4 text-center font-body-md text-label-md text-on-surface-variant">
                            Don't have an account? 
                            <a class="text-primary font-bold hover:underline underline-offset-4" href="#">Create Account</a>
</p>
</div>
</form>
<!-- Divider -->
<!-- Secondary Options -->
</div>
<!-- Health Accents / Trust Indicators -->
<div class="mt-12 flex flex-col items-center gap-6">
<div class="flex items-center gap-8">
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-full bg-secondary-container/30 flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>
<span class="font-label-md text-[10px] uppercase tracking-widest text-secondary">HIPAA Secure</span>
</div>
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed-variant">
<span class="material-symbols-outlined" data-icon="shield_with_heart">shield_with_heart</span>
</div>
<span class="font-label-md text-[10px] uppercase tracking-widest text-tertiary">Data Protected</span>
</div>
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
</div>
<span class="font-label-md text-[10px] uppercase tracking-widest text-primary">24/7 Support</span>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="w-full mt-auto flex flex-col items-center gap-4 px-4 py-8 text-center bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
<div class="flex flex-wrap justify-center gap-6">
<a class="font-['Public_Sans'] text-xs tracking-wide text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-300 transition-colors" href="#">Privacy Policy</a>
<a class="font-['Public_Sans'] text-xs tracking-wide text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-300 transition-colors" href="#">Terms of Service</a>
<a class="font-['Public_Sans'] text-xs tracking-wide text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-300 transition-colors" href="#">Help Center</a>
</div>
<p class="font-['Public_Sans'] text-xs tracking-wide text-slate-400 dark:text-slate-500 uppercase">
             
        </p>
</footer>
</body></html>
