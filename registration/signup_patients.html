<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | HealthSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f7f9fb",
                    "primary-container": "#007abc",
                    "tertiary-fixed": "#d2e6ef",
                    "on-primary-fixed-variant": "#004a75",
                    "background": "#f7f9fb",
                    "on-secondary-container": "#0c7521",
                    "on-tertiary-fixed-variant": "#374951",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#b6cad2",
                    "surface-container": "#eceef0",
                    "tertiary": "#4c5f66",
                    "on-background": "#191c1e",
                    "on-primary-fixed": "#001d32",
                    "on-surface": "#191c1e",
                    "primary-fixed-dim": "#96ccff",
                    "secondary-fixed": "#98f994",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#7ddc7a",
                    "on-tertiary-container": "#fafdff",
                    "outline": "#707882",
                    "surface-container-high": "#e6e8ea",
                    "outline-variant": "#bfc7d2",
                    "on-secondary-fixed": "#002204",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#cee5ff",
                    "on-primary-container": "#fdfcff",
                    "inverse-surface": "#2d3133",
                    "on-secondary-fixed-variant": "#005313",
                    "on-tertiary-fixed": "#0b1e24",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "surface-variant": "#e0e3e5",
                    "surface-bright": "#f7f9fb",
                    "inverse-primary": "#96ccff",
                    "surface-dim": "#d8dadc",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "secondary": "#006e1c",
                    "surface-tint": "#00639a",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#65777f",
                    "on-surface-variant": "#3f4851",
                    "inverse-on-surface": "#eff1f3",
                    "secondary-container": "#98f994",
                    "primary": "#006096"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-max-width": "640px",
                    "base": "8px",
                    "card-padding": "32px",
                    "margin-mobile": "16px",
                    "input-height": "56px"
            },
            "fontFamily": {
                    "headline-md": ["Public Sans"],
                    "headline-lg": ["Public Sans"],
                    "body-md": ["Public Sans"],
                    "label-md": ["Public Sans"],
                    "body-lg": ["Public Sans"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="text-xl font-bold tracking-tight text-sky-700 dark:text-sky-300">HealthSync</div>
<div class="flex gap-6 items-center">
<span class="font-public-sans text-sm font-medium text-slate-500 cursor-pointer hover:text-sky-600 transition-colors">Sign In</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-16 px-4">
<div class="max-w-[640px] w-full">
<!-- Signup Card -->
<div class="bg-surface-container-lowest border border-outline-variant shadow-sm rounded-xl p-card-padding overflow-hidden">
<!-- Progress Indicator -->
<div class="w-full bg-surface-container rounded-full h-1 mb-8">
<div class="bg-secondary h-1 rounded-full w-1/3"></div>
</div>
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join HealthSync to manage your clinical journey with precision.</p>
</div>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="name">Full Name *</label>
<div class="relative group">
<input class="w-full h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="name" placeholder="Johnathan Doe" required="" type="text"/>
</div>
</div>
<!-- Age & Gender Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="age">Age *</label>
<input class="w-full h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="age" inputmode="numeric" placeholder="e.g. 28" required="" type="number"/>
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">Gender *</label>
<div class="flex items-center h-[56px] gap-4">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="gender" type="radio" value="male"/>
<span class="font-body-md text-body-md">Male</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="gender" type="radio" value="female"/>
<span class="font-body-md text-body-md">Female</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="gender" type="radio" value="other"/>
<span class="font-body-md text-body-md">Other</span>
</label>
</div>
</div>
</div>
<!-- Mobile Number -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="phone">Mobile Number *</label>
<div class="flex items-center gap-2">
<div class="flex items-center justify-center px-4 h-[56px] bg-surface-container border border-outline-variant rounded-lg text-on-surface-variant font-body-md">
                                +91
                            </div>
<input class="flex-grow h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="phone" inputmode="tel" pattern="[0-9]{10}" placeholder="98765 43210" required="" type="tel"/>
</div>
<p class="text-[12px] text-on-surface-variant mt-1 ml-1">We'll send a clinical verification code.</p>
</div><!-- Password -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="password">Password *</label>
<div class="relative group">
<input class="w-full h-[56px] pl-4 pr-12 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div><!-- Confirm Password -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="confirm-password">Confirm Password *</label>
<div class="relative group">
<input class="w-full h-[56px] pl-4 pr-12 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="confirm-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email Address (Optional)</label>
<input class="w-full h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="email" placeholder="name@hospital.com" type="email"/>
</div>
<!-- Height & Weight Grid -->
<div class="grid grid-cols-2 gap-6">
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="height">Height (cm)</label>
<input class="w-full h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="height" inputmode="numeric" placeholder="175" type="number"/>
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="weight">Weight (kg)</label>
<input class="w-full h-[56px] px-4 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" id="weight" inputmode="numeric" placeholder="70" type="number"/>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-lg font-label-md text-lg shadow-sm hover:bg-primary-container disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-[0.98]" disabled="" type="submit">
                            Create Account
                        </button>
</div>
</form>
</div>
<!-- Footer Section -->
<footer class="mt-8 text-center space-y-4">
<p class="font-body-md text-on-surface-variant text-sm">
                    Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Sign In</a>
</p>
<div class="flex flex-wrap justify-center gap-4 py-4 border-t border-outline-variant/30">
<span class="font-public-sans text-xs text-slate-500 cursor-pointer hover:text-sky-600">Privacy Policy</span>
<span class="font-public-sans text-xs text-slate-500 cursor-pointer hover:text-sky-600">Terms of Service</span>
<span class="font-public-sans text-xs text-slate-500 cursor-pointer hover:text-sky-600">Help Center</span>
</div>
<p class="font-public-sans text-xs text-slate-400"></p>
</footer>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full blur-3xl bg-primary/10"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full blur-3xl bg-secondary/10"></div>
</div>
</body></html>
